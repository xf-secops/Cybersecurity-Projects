# ©AngelaMos | 2026
# .goreleaser.yaml

version: 2

project_name: crypha

before:
  hooks:
    - go mod tidy

builds:
  - id: crypha
    main: ./cmd/crypha
    binary: crypha
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: crypha
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: CarterPerez-dev
    name: crypha
