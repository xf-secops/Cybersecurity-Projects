# .golangci.yml

version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - gosec
    - bodyclose
    - nilerr
    - errorlint
    - exhaustive
    - gocritic
    - funlen
    - gocognit
    - dupl
    - goconst
    - ineffassign
    - unused
    - unconvert
    - unparam
    - testifylint
    - fatcontext

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    funlen:
      lines: 100
      statements: 50

    gocognit:
      min-complexity: 20

    govet:
      enable-all: true
      disable:
        - fieldalignment

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-declaration
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code

    staticcheck:
      checks:
        - all

    gosec:
      excludes:
        - G104
        - G706

    sloglint:
      no-mixed-args: true
      kv-only: true
      context: all

  exclusions:
    paths:
      - vendor
      - testdata
    rules:
      - path: _test\.go
        linters:
          - funlen
          - dupl
          - goconst
      - path: internal/notify/telegram/sender\.go
        linters:
          - gosec
        text: "G107|G704"
      - path: internal/notify/webhook/sender\.go
        linters:
          - gosec
        text: "G107|G704"
      - path: internal/turnstile/verifier\.go
        linters:
          - gosec
        text: "G107|G704"
      - path: internal/config/config\.go
        linters:
          - gosec
        text: "G101"

issues:
  max-same-issues: 50


formatters:
  enable:
    - gci        # Groups imports
    - gofumpt    # Whitespace
    - golines    # Vertical wrap
  settings:
    golines:
      max-len: 80
      reformat-tags: true
    goimports:
      local-prefixes:
        - github.com/CarterPerez-dev/cybersecurity-projects/canary-token-generator
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/CarterPerez-dev)
      custom-order: true
    gofumpt:
      extra-rules: true
